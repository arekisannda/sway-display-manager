name: Bump version action

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.2.3)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          fetch-depth: 0

      - name: Validate semver
        run: |
          set -euo pipefail

          if ! grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' <<< "${{ github.event.inputs.version }}"; then
            echo "${{ github.event.inputs.version }} is not a valid semver string"
            exit 1
          fi

      - name: Check if tag exists
        run: |
          set -euo pipefail

          tags_output=$(git ls-remote --tags origin)

          if grep -q "refs/tags/v${{ github.event.inputs.version }}$" <<< "$tags_output"; then
            echo "Tag v${{ github.event.inputs.version }} already exists"
            exit 1
          fi

      - name: Update Nix package version
        run: |
          set -euo pipefail

          sed -i -E 's/version = "[^"]*";$/version = "${{ github.event.inputs.version }}";/' default.nix
          sed -i -E 's/^version = "[^"]*"$/version = "${{ github.event.inputs.version }}"/' pyproject.toml

      - name: Open version bump PR
        id: bump_pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 #v8.1.1
        with:
          commit-message: "chore: bump version to ${{ steps.next_version.outputs.version }}"
          branch: release/${{ steps.next_version.outputs.version }}
          title: "Release ${{ steps.next_version.outputs.version }}"
          body: |
            Automated version bump for release ${{ steps.next_version.outputs.version }}.
          labels: release

      - name: Enable auto-merge
        if: steps.bump_pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.bump_pr.outputs.pull-request-number }} --auto --squash --delete-branch
