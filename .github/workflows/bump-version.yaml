name: Bump version action

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          ref: main
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/python-uv-env

      - name: Compute next version
        id: next
        run: |
          set -euo pipefail

          next_version=$(uv version --bump ${{ inputs.bump }} --dry-run --short)
          echo "VERSION=$next_version" >> "$GITHUB_ENV"

      - name: Check if tag exists
        run: |
          set -euo pipefail

          tags_output=$(git ls-remote --tags origin)

          if grep -q "refs/tags/v${{ env.VERSION }}$" <<< "$tags_output"; then
            echo "Tag v${{ env.VERSION }} already exists"
            exit 1
          fi

      - name: Update pyproject.toml version
        run: uv version "${{ env.VERSION }}"

      - name: Generate app token
        id: app_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 #v3.2.0
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Open version bump PR
        id: bump_pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 #v8.1.1
        with:
          token: ${{ steps.app_token.outputs.token }}
          sign-commits: true
          commit-message: "chore: bump version to ${{ env.VERSION }}"
          branch: release/v${{ env.VERSION }}
          title: "Release v${{ env.VERSION }}"
          body: |
            Automated version bump for release v${{ env.VERSION }}.
          labels: release

      - name: Enable auto-merge
        if: steps.bump_pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: gh pr merge ${{ steps.bump_pr.outputs.pull-request-number }} --auto --squash --delete-branch
